name: cheebo_healthcare
description: The Cheebo Healthcare Mobile App (Flutter).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.6
  speech_to_text: ^7.0.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.2
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  flutter_tts: ^4.0.2
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
